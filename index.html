<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta rel="canonical" href="https://smart-fit-ai-kappa.vercel.app/" />
  <title>SmartFit AI - AI-Powered Personal Training & Smart Fitness Hub</title>
  <meta name="description"
    content="Experience the future of fitness with SmartFit AI. Get personalized AI-powered workout plans, smart nutrition tracking, and 24/7 coaching. Join 10K+ members transforming their lives with SmartFit AI." />
  <meta name="keywords"
    content="SmartFit AI, AI fitness trainer, smart gym, personalized workout plans, AI workout generator, fitness tracking, smart nutrition" />
  <meta name="author" content="SmartFit AI" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />


  <!-- Open Graph -->
  <meta property="og:title" content="SmartFit AI - The World's Most Advanced AI Fitness Hub" />
  <meta property="og:description"
    content="Transform your body with SmartFit AI. Personalized workouts, smart nutrition, and real-time AI coaching for a smarter fitness journey." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://smart-fit-ai-kappa.vercel.app/favicon.png" />
  <meta property="og:url" content="https://smart-fit-ai-kappa.vercel.app/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@SmartFitHub" />
  <meta name="twitter:image" content="/favicon.png" />

  <!-- Google Analytics (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MBDE4DZVXT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-MBDE4DZVXT');
  </script>

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SmartFit AI",
      "operatingSystem": "Web",
      "applicationCategory": "HealthApplication",
      "description": "AI-powered personal training, smart nutrition plans, and real-time form detection.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1024"
      }
    }
  </script>
</head>

<body style="margin: 0; background: #0a0a0a;">
  <div id="root">
    <!-- Initial loading shown while React loads -->
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0a; overflow: hidden; position: relative; flex-direction: column;">
      
      <!-- Container for Spark Edge Animation -->
      <div style="position: relative; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 16px; width: 256px; height: 256px; overflow: hidden; box-shadow: 0 0 40px rgba(0,255,156,0.15); z-index: 10;">
        
        <!-- The rotating spark gradient -->
        <div style="position: absolute; inset: -50%; background: conic-gradient(from 0deg, transparent 0 340deg, #00FF9C 360deg); animation: spin 3s linear infinite; z-index: 0;"></div>

        <!-- The inner black card -->
        <div style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: #0a0a0a; border-radius: 12px;">
            <!-- Logo area -->
            <div style="position: relative; margin-bottom: 24px;">
               <div style="position: absolute; inset: 0; background: #00FF9C; filter: blur(20px); opacity: 0.2; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;"></div>
               <img src="/favicon.png" alt="SmartFit Hub Logo" style="position: relative; width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(0,255,156,0.5)); z-index: 20; animation: logoPulse 3s ease-in-out infinite;" />
            </div>
            
            <!-- Text branding -->
            <h1 style="font-size: 24px; font-weight: bold; color: white; letter-spacing: 0.05em; margin: 0 0 8px 0; font-family: system-ui, -apple-system, sans-serif;">
              SmartFit<span style="color: #00FF9C;">AI</span>
            </h1>
            
            <div style="display: flex; align-items: center; gap: 8px; color: #a1a1aa; font-family: monospace; font-size: 14px; letter-spacing: 0.1em; margin-top: 16px;">
              <span style="position: relative;">INITIALIZING<span style="display: inline-block; width: 12px; text-align: left; animation: ellipsis 2s infinite steps(4, end);">...</span></span>
            </div>
        </div>
      </div>

      <!-- Optional global ambient glow behind the card -->
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40vw; height: 40vw; max-width: 500px; max-height: 500px; background: #00FF9C; opacity: 0.03; filter: blur(100px); border-radius: 50%; pointer-events: none; z-index: 1;"></div>
    </div>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
      
      @media (min-width: 640px) {
        #root > div > div:nth-child(1) {
          width: 320px !important;
          height: 320px !important;
        }
        #root img {
          width: 96px !important;
          height: 96px !important;
        }
        #root h1 {
          font-size: 30px !important;
        }
      }
    </style>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
