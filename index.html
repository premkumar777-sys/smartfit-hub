<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>SmartFit</title>
  <meta name="description"
    content="Transform your fitness journey with AI-powered personal training, smart nutrition plans, and comprehensive gym management. Join 10K+ members achieving their goals." />
  <meta name="author" content="SmartFit" />


  <!-- Open Graph -->
  <meta property="og:title" content="SmartFit Hub - AI-Powered Smart Gym & Fitness Platform" />
  <meta property="og:description"
    content="Experience the future of fitness with personalized workouts, AI coaching, and smart gym management." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/favicon.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@SmartFitHub" />
  <meta name="twitter:image" content="/favicon.png" />
</head>

<body>
  <div id="root">
    <!-- Loading screen shown while React app loads -->
    <style>
      .loading-screen {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
        gap: 24px;
      }

      .loading-logo {
        width: 120px;
        height: 120px;
        animation: pulse 2s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(0, 255, 156, 0.5));
      }

      .loading-text {
        color: #00FF9C;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 24px;
        font-weight: bold;
        letter-spacing: 2px;
      }

      .loading-dots {
        display: flex;
        gap: 8px;
      }

      .loading-dot {
        width: 10px;
        height: 10px;
        background: #00FF9C;
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }

      .loading-dot:nth-child(1) {
        animation-delay: 0s;
      }

      .loading-dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .loading-dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {

        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }

        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }

      @keyframes bounce {

        0%,
        80%,
        100% {
          transform: translateY(0);
        }

        40% {
          transform: translateY(-10px);
        }
      }
    </style>
    <div class="loading-screen">
      <img src="/favicon.png" alt="SmartFit" class="loading-logo" />
      <span class="loading-text">SmartFit</span>
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
