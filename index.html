<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta rel="canonical" href="https://smart-fit-ai-kappa.vercel.app/" />
  <title>SmartFit AI - AI-Powered Personal Training & Smart Fitness Hub</title>
  <meta name="description"
    content="Experience the future of fitness with SmartFit AI. Get personalized AI-powered workout plans, smart nutrition tracking, and 24/7 coaching. Join 10K+ members transforming their lives with SmartFit AI." />
  <meta name="keywords"
    content="SmartFit AI, AI fitness trainer, smart gym, personalized workout plans, AI workout generator, fitness tracking, smart nutrition" />
  <meta name="author" content="SmartFit AI" />


  <!-- Open Graph -->
  <meta property="og:title" content="SmartFit AI - The World's Most Advanced AI Fitness Hub" />
  <meta property="og:description"
    content="Transform your body with SmartFit AI. Personalized workouts, smart nutrition, and real-time AI coaching for a smarter fitness journey." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://smart-fit-ai-kappa.vercel.app/favicon.png" />
  <meta property="og:url" content="https://smart-fit-ai-kappa.vercel.app/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@SmartFitHub" />
  <meta name="twitter:image" content="/favicon.png" />

  <!-- Google Analytics (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MBDE4DZVXT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-MBDE4DZVXT');
  </script>

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SmartFit AI",
      "operatingSystem": "Web",
      "applicationCategory": "HealthApplication",
      "description": "AI-powered personal training, smart nutrition plans, and real-time form detection.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1024"
      }
    }
  </script>
</head>

<body style="margin: 0; background: #080a0d;">
  <div id="root">
    <!-- Initial loading shown while React loads -->
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #080a0d;">
      <div style="text-align: center;">
        <div style="position: relative; width: 112px; height: 112px; margin: 0 auto 16px;">
          <div
            style="position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: #00FF9C; border-right-color: #00FF9C; animation: spin 1s linear infinite; filter: drop-shadow(0 0 8px rgba(0,255,156,0.5));">
          </div>
          <div
            style="position: absolute; inset: 4px; border-radius: 50%; border: 2px solid transparent; border-top-color: rgba(0,255,156,0.3); animation: spin 1.5s linear infinite reverse;">
          </div>
          <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;">
            <img src="/favicon.png" alt="SmartFit"
              style="width: 64px; height: 64px; filter: drop-shadow(0 0 15px rgba(0,255,156,0.4));" />
          </div>
        </div>
        <p style="color: #888; font-family: system-ui, sans-serif; margin: 0;">Loading SmartFit...</p>
      </div>
    </div>
    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
